# https://mise.jdx.dev -- One tool to manage languages, env vars, and tasks per project, reproducibly.

redactions = ["*_KEY", "HOF_SYSTEM_PASSWORD", "HOF_DATABASE_URL", "HOF_AZURE_URL", "HOF_SENTRY_DSN"]

[tools]
bun = "1.3.14"
node = "26"

[env]
_.file = ["env", ".env.local"]
_.path = ["{{config_root}}/node_modules/.bin"]

# Use "mise t" to list tasks or "mise r" to interactively select one to run!

# DEVELOPMENT TASKS
# =================

[tasks."dev:deps-upgrade"]
description = "Upgrades mise-en-place, proposes upgrades for tools managed by mise, and proposes upgrades for package.json dependencies."
interactive = true
run = [
  "mise self-update",
  "mise up --interactive --bump",
  # using `mise exec bun` makes sure bun is found if a bun upgrade was just made
  "mise exec bun -- bun update --interactive",
  # make sure transitive dependencies are updated & deduplicated
  "mise exec bun -- bun update"
]

[tasks."dev:server"]
description = "Run server in watch mode."
depends = "dev:db:start"
env = { TF_CPP_MIN_LOG_LEVEL = "1" }
raw = true
run = "bun --watch --no-clear-screen --inspect projects/server/main.ts"

[tasks."dev:client"]
description = "Serve frontend application in development mode."
raw = true
run = "bun ng serve"

[tasks."dev:db:start"]
description = "Start local MongoDB in Docker for development."
run = "docker compose -f docker-compose.dev.yml up -d mongo"

[tasks."dev:db:stop"]
description = "Stop local MongoDB Docker container."
run = "docker compose -f docker-compose.dev.yml down"

# CHECK TASKS
# ===========

[tasks."check"]
description = "Run lint checks (typescript and oxfmt/oxlint), with safe auto-fixes."
# Not using `depends` because we want a sequential run with lint then format.
run = ["mise check:tsc", "mise check:oxlint", "mise check:oxfmt"]

[tasks."check:tsc"]
description = "Type-checks code with tsc."
depends = "build:prisma:generate"
raw = true
run = "bun --bun tsc --noEmit"

[tasks."check:oxfmt"]
description = "Formats code with oxfmt."
depends = "build:prisma:generate"
raw = true
run = "bun --bun oxfmt"

[tasks."check:oxlint"]
description = "Lints code with oxlint."
depends = "build:prisma:generate"
raw = true
run = "bun --bun oxlint --fix"

# CHECK TASKS (AGENTS)
# ====================

[tasks."check:agents"]
description = "Run lint checks (typescript and oxfmt/oxlint), with safe auto-fixes, output optimized for AI agents."
# Not using `depends` because we want a sequential run with lint then format.
run = ["mise check:agents:tsc", "mise check:agents:oxlint", "mise check:oxfmt"]

[tasks."check:agents:tsc"]
description = "Type-checks code with tsc, output optimized for AI agents."
depends = "build:prisma:generate"
raw = true
run = "bun --bun tsc --noEmit --pretty false"

[tasks."check:agents:oxlint"]
description = "Lints code with oxlint, output optimized for AI agents."
depends = "build:prisma:generate"
run = "bun --bun oxlint --fix --format agent"

# BUILD TASKS
# ===========

[tasks.build]
description = "Build the application for production."
depends = ["check", "build:client"]
raw = true

[tasks."build:client"]
description = "Build the frontend application."
raw = true
run = "bun ng build"

[tasks."build:prisma:generate"]
description = "generate the prisma client and types."
sources = ["prisma/run-prisma-generate.ts", "schema.prisma"]
raw = true
run = "bun prisma/run-prisma-generate.ts"

# RUN TASKS
# =========

[tasks."run:cli"]
description = "Run the CLI app."
env = { TF_CPP_MIN_LOG_LEVEL = "1" }
raw = true
run = "bun projects/server/cli/main.ts"

[tasks."run:server"]
description = "Run the server app."
env = { TF_CPP_MIN_LOG_LEVEL = "1" }
raw = true
run = "bun projects/server/main.ts"

[tasks."run:server:light"]
description = "Run the server app, using a smaller heap -- useful when working on the mod with the editor and game open so the server does not consume too much memory."
env = { TF_CPP_MIN_LOG_LEVEL = "1" }
raw = true
run = "bun --smol projects/server/main.ts"
